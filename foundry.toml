[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "", url = "https://testnet.arcscan.app/api" }

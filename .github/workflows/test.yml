name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forge:
    name: forge build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge install forge-std
        run: forge install foundry-rs/forge-std --no-git

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vv

  sdk-ts:
    name: forum-arc-sdk typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sdk-ts/package.json

      - run: npm install
      - run: npx tsc --noEmit

  sdk-py:
    name: forum-arc Python import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install deps
        run: pip install web3 eth-account

      - name: import smoke
        run: python -c "from src.forum_arc import ForumClient, ForumAddresses, ARC_TESTNET; print('forum_arc imports OK')"

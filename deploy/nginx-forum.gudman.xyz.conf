# Forum landing + indexer — Arc operator plane for prediction-market bots
# Domain: forum.gudman.xyz
# Source: /opt/forum/web/  (single-file index.html, viem from CDN)
# API:    127.0.0.1:3060   (forum-indexer.service)
#
# Drop this in /etc/nginx/sites-available/forum.gudman.xyz.conf
# Then: ln -s ../sites-available/forum.gudman.xyz.conf /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name forum.gudman.xyz;

    include /etc/nginx/snippets/acme-challenge.conf;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forum.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/forum.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /opt/forum/web;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3060/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
